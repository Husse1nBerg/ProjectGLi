# Render Blueprint — free full-stack deploy.
# The Express server serves the built React client AND the /api endpoint on one URL.
# Set OPENAI_API_KEY in the Render dashboard (it is intentionally NOT stored here).
services:
  - type: web
    name: heloc-car-calculator
    runtime: node
    plan: free
    buildCommand: npm --prefix client install --include=dev && npm --prefix client run build && npm --prefix server install
    startCommand: npm --prefix server start
    envVars:
      - key: OPENAI_API_KEY
        sync: false # secret — enter it in the Render dashboard, never in the repo
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: GOOGLE_API_KEY
        sync: false # optional — enables real Google image search; secret
      - key: GOOGLE_CSE_ID
        sync: false # optional — Programmable Search Engine ID
      - key: NODE_VERSION
        value: 22.13.0
